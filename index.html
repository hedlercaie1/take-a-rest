<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$REST - Where life is simpler</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://www.youtube.com">
    
    <style>
        body, html { 
            background-color: #000 !important; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }

        .yt-container {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; 
            overflow: hidden; pointer-events: none;
        }
        
        #ytplayer {
            width: 100vw; height: 56.25vw; 
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
        }

        .overlay {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1 !important;
            background-color: rgba(0, 0, 0, 0.7) !important; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.2'/%3E%3C/svg%3E") !important;
        }

        #main-content {
            position: relative; 
            z-index: 2; 
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            text-align: center; pointer-events: none;
        }

        h1 {
            font-size: 5rem; color: #fff; letter-spacing: 5px; 
            margin: 0 0 20px 0;
            text-shadow: 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.3);
        }

        .dynamic-text-container {
            position: relative;
            width: 100%; height: 60px; 
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }

        .ticker-wrap {
            position: absolute; width: 100%; overflow: hidden;
            white-space: nowrap; transition: opacity 1s ease-in-out;
            opacity: 1; 
        }
        
        .ticker-move {
            display: inline-block; padding-left: 100%;
            animation: ticker 25s linear infinite; 
            font-family: 'Courier New', monospace; font-size: 1.2rem; color: #fff;
            letter-spacing: 8px; text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        
        @keyframes ticker { 
            0% { transform: translate3d(0, 0, 0); } 
            100% { transform: translate3d(-100%, 0, 0); } 
        }

        #quote-display {
            position: absolute;
            font-family: 'Courier New', monospace; font-size: 1.1rem; color: rgba(255, 255, 255, 0.85);
            text-transform: uppercase; letter-spacing: 5px; width: 80%;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            opacity: 0; transition: opacity 1s ease-in-out;
        }

        .ca-box {
            margin-top: 30px; padding: 12px 20px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3); cursor: pointer;
            display: flex; align-items: center; gap: 10px; pointer-events: auto;
            transition: all 0.2s;
        }
        
        .ca-box:hover {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
        }

        .unmute-hint {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.4); font-size: 12px; z-index: 3; cursor: pointer;
            font-family: Arial, sans-serif; letter-spacing: 1px;
            transition: color 0.3s; pointer-events: auto;
        }
        .unmute-hint:hover { color: #fff; }

        /* SLIDER DE VOLUME (Estilo Retro) */
        .vol-container {
            position: absolute; bottom: 30px; right: 30px;
            z-index: 4; display: flex; align-items: center; gap: 10px;
            opacity: 0; /* Começa escondido */
            transition: opacity 1s ease; pointer-events: auto;
        }

        .vol-label {
            font-family: 'Courier New', monospace; font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5); letter-spacing: 2px;
        }

        input[type=range] {
            -webkit-appearance: none; background: transparent; width: 100px; cursor: pointer;
        }
        input[type=range]:focus { outline: none; }
        
        /* A linha do slider */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 2px; background: rgba(255, 255, 255, 0.3);
        }
        
        /* O botão do slider */
        input[type=range]::-webkit-slider-thumb {
            height: 14px; width: 8px; background: #fff;
            -webkit-appearance: none; margin-top: -6px; 
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    </style>
</head>
<body>

    <div class="yt-container">
        <div id="ytplayer"></div>
    </div>
    
    <div class="overlay"></div>

    <div id="main-content">
        <h1>$REST</h1>
        
        <div class="dynamic-text-container">
            <div id="quote-display"></div>
            <div class="ticker-wrap" id="ticker">
                <div class="ticker-move">$REST // $REST // $REST // $REST // $REST // $REST // $REST // $REST // $REST</div>
            </div>
        </div>
        
        <div class="ca-box" onclick="copyCA()">
            <span style="color:rgba(255,255,255,0.5); font-family:monospace; font-size: 0.9rem; letter-spacing: 2px;">CA:</span>
            <span id="caText" style="color:#fff; font-family:monospace; font-size: 1rem; letter-spacing: 1px;">Soon</span>
        </div>
    </div>

    <div class="unmute-hint" id="unmuteBtn">[ Click anywhere to unmute ]</div>

    <div class="vol-container" id="volControl">
        <span class="vol-label">VOL</span>
        <input type="range" id="volSlider" min="0" max="100" value="100">
    </div>

    <script>
        const quotes = [
            "The world is too loud, and I am too tired.",
            "Searching for a place that doesn't exist.",
            "I've been awake for too long.",
            "Everything is moving, but I am standing still.",
            "A digital soul in a heavy body.",
            "Running out of reasons to keep running.",
            "Silence is the only thing that understands me.",
            "Too much noise, not enough soul.",
            "Disconnecting to find where I went.",
            "Please, just let me sleep a little longer."
        ];

        let showTicker = true;
        const tickerEl = document.getElementById('ticker');
        const quoteEl = document.getElementById('quote-display');

        setInterval(() => {
            if (showTicker) {
                tickerEl.style.opacity = 0;
                setTimeout(() => {
                    quoteEl.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                    quoteEl.style.opacity = 1; 
                }, 1000);
            } else {
                quoteEl.style.opacity = 0;
                setTimeout(() => { tickerEl.style.opacity = 1; }, 1000);
            }
            showTicker = !showTicker;
        }, 10000); 

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                videoId: 'jsd2VSZVTF8', // <--- ID DO VÍDEO AQUI
                playerVars: { 
                    'autoplay': 1, 'controls': 0, 'disablekb': 1,
                    'loop': 1, 'playlist': 'jsd2VSZVTF8', // <--- ID AQUI TAMBÉM PARA O LOOP
                    'modestbranding': 1, 'playsinline': 1,
                    'rel': 0, 'showinfo': 0, 'mute': 1 
                },
                events: {
                    'onReady': function(event) { event.target.playVideo(); }
                }
            });
        }

        // Lógica de Ativação (Unmute + Mostrar Volume)
        document.body.addEventListener('click', function(e) {
            if (!e.target.closest('.ca-box') && !e.target.closest('#volSlider') && player && player.isMuted()) {
                player.unMute();
                player.setVolume(100);
                
                document.getElementById('unmuteBtn').style.opacity = 0;
                setTimeout(() => { document.getElementById('unmuteBtn').style.display = 'none'; }, 300);
                
                document.getElementById('volControl').style.opacity = 1;
            }
        });

        // Evento para arrastar o slider de volume
        document.getElementById('volSlider').addEventListener('input', function(e) {
            if (player) {
                player.setVolume(e.target.value);
            }
        });

        // Copiar CA
        function copyCA() {
            const caElement = document.getElementById('caText');
            const caString = caElement.innerText;
            if(caString === "Soon" || caString === "COPIED!") return; 

            navigator.clipboard.writeText(caString).then(() => {
                const oldColor = caElement.style.color;
                caElement.innerText = "COPIED!";
                caElement.style.color = "#0ff"; 
                setTimeout(() => {
                    caElement.innerText = caString;
                    caElement.style.color = oldColor || "#fff";
                }, 2000);
            });
        }
    </script>
</body>
</html>
